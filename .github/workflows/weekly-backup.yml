name: Weekly Database Backup

on:
  schedule:
    # Every Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger

env:
  BACKUP_BUCKET: ${{ secrets.GCS_BUCKET_NAME }}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Set backup filename
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M)
          echo "BACKUP_FILE=espanyol-academy-backup-$DATE.sql.gz" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Install PostgreSQL 17 client
        run: |
          # Add PostgreSQL apt repository for version 17
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Add PG17 to PATH (prepend so it takes priority)
          echo "/usr/lib/postgresql/17/bin" >> $GITHUB_PATH
          # Verify version using explicit path
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Export database with pg_dump
        env:
          PATH: /usr/lib/postgresql/17/bin:${{ env.PATH }}
        run: |
          echo "Exporting database..."
          echo "pg_dump version: $(pg_dump --version)"
          
          # Clean DATABASE_URL - remove channel_binding parameter which pg_dump doesn't support
          DB_URL="${{ secrets.DATABASE_URL }}"
          DB_URL=$(echo "$DB_URL" | sed 's/&channel_binding=[^&]*//g' | sed 's/?channel_binding=[^&]*&/?/g' | sed 's/?channel_binding=[^&]*$//')
          
          echo "Cleaned URL (masked): postgresql://***@***/neondb?sslmode=require"
          
          echo "Testing database connection..."
          
          # Test connection first with output
          /usr/lib/postgresql/17/bin/psql "$DB_URL" -c "SELECT current_database(), pg_size_pretty(pg_database_size(current_database()));" || {
            echo "❌ Failed to connect to database!"
            echo "Check your DATABASE_URL secret is correct"
            exit 1
          }
          
          echo "✅ Database connection successful"
          
          # First do a plain dump to a file (not piped) to capture errors properly
          echo "Running pg_dump..."
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" --no-owner --no-acl > backup.sql 2>pg_dump_errors.log
          DUMP_EXIT=$?
          
          # Show any errors
          if [ -s pg_dump_errors.log ]; then
            echo "pg_dump output:"
            cat pg_dump_errors.log
          fi
          
          if [ $DUMP_EXIT -ne 0 ]; then
            echo "❌ pg_dump failed with exit code $DUMP_EXIT"
            exit 1
          fi
          
          # Check raw dump size
          RAW_SIZE=$(stat -c%s backup.sql)
          echo "Raw dump size: $RAW_SIZE bytes"
          
          if [ "$RAW_SIZE" -lt 1000 ]; then
            echo "❌ Dump too small. Content:"
            cat backup.sql
            exit 1
          fi
          
          # Compress
          gzip -c backup.sql > ${{ env.BACKUP_FILE }}
          
          # Check compressed size
          SIZE=$(stat -c%s ${{ env.BACKUP_FILE }})
          echo "Compressed backup size: $SIZE bytes"
          
          echo "✅ Export successful"
          ls -lh ${{ env.BACKUP_FILE }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload to Google Cloud Storage
        run: |
          echo "Uploading to GCS bucket: ${{ env.BACKUP_BUCKET }}"
          gsutil cp ${{ env.BACKUP_FILE }} gs://${{ env.BACKUP_BUCKET }}/backups/
          echo "✅ Backup uploaded: gs://${{ env.BACKUP_BUCKET }}/backups/${{ env.BACKUP_FILE }}"

      - name: Cleanup old backups (keep last 8 weeks)
        run: |
          echo "Cleaning up backups older than 56 days..."
          gsutil ls -l gs://${{ env.BACKUP_BUCKET }}/backups/ | \
            awk -v cutoff=$(date -d '56 days ago' +%Y-%m-%d) '$2 < cutoff {print $3}' | \
            xargs -r gsutil rm || true

      - name: Verify backup
        run: |
          echo "Verifying backup exists..."
          gsutil ls gs://${{ env.BACKUP_BUCKET }}/backups/${{ env.BACKUP_FILE }}
          SIZE=$(gsutil du -s gs://${{ env.BACKUP_BUCKET }}/backups/${{ env.BACKUP_FILE }} | awk '{print $1}')
          echo "Backup size: $SIZE bytes"
          
          if [ "$SIZE" -lt 1000 ]; then
            echo "❌ Backup seems too small!"
            exit 1
          fi
          echo "✅ Backup verified successfully"
